<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Tracker - ICT 10 Emerald</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        /* Apply Gill Sans to the entire document */
        * {
            font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
        }

        body {
            margin: 0;
            background-color: #0a1f44;
            color: white;
            min-height: 100vh;
        }

        /* Navigation Bar */
        nav {
            background-color: #ffd700;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #0a1f44;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* Layout Cards */
        .attendance-card {
            background-color: #06142e;
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Form Styling */
        .form-control, .form-select {
            background-color: #0a1f44 !important;
            border: 1px solid #ffd700 !important;
            color: white !important;
        }

        /* Gold Button Styling */
        .btn-gold {
            background-color: #ffd700 !important;
            color: #0a1f44 !important;
            font-weight: bold;
            border-radius: 30px;
            width: 100%;
            padding: 12px;
            border: none !important;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-gold:hover {
            background-color: #e6c200 !important;
            transform: translateY(-2px);
        }

        /* Plot Display Area */
        #plot-area {
            background: white; 
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            min-height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1, h2, h3 {
            color: #ffd700;
        }
        
        p {
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="index4.html">Classmates</a>
        <a href="index2.html">Attendance</a>
        <a href="index5.html">Photos</a>
        <a href="index3.html">Add Classmate</a>
    </nav>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 style="font-weight: bold; color: white;">FV 10 - Emerald</h1>
            <h2 class="h4">Attendance Tracker</h2>
            <p>Log daily absences and visualize class data in real-time.</p>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="attendance-card">
                    <h2 class="h5 mb-4">Log Absences</h2>
                    <form id="attendance-form">
                        <div class="mb-3">
                            <label for="day-select" class="form-label">Select Day:</label>
                            <select id="day-select" class="form-select">
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="absences-input" class="form-label">Number of Students Absent:</label>
                            <input id="absences-input" type="number" min="0" class="form-control" placeholder="Enter number..." />
                        </div>
                        <button py-click="submit_attendance" type="button" class="btn-gold">Update Chart</button>
                    </form>
                    <div id="status" class="mt-3 text-center font-monospace" style="font-size: 0.9rem;">
                        Initializing Python...
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="attendance-card">
                    <h3 class="h5 mb-4">Weekly Absence Trend</h3>
                    <div id="plot-area">
                        <div class="text-dark">Loading Chart...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <py-config>
        packages = ["matplotlib", "numpy"]
    </py-config>

    <script type="py" src="main2.py"></script>

</body>
</html>

    <style>
        body { 
            margin: 0; 
            font-family: "Gill Sans", sans-serif; 
            background-color: #0a1f44; 
            color: white; 
        }
        nav { 
            background-color: #FFD500;
            padding: 15px; 
            display: flex;
            justify-content: center; 
            gap: 30px; 
        }
        nav a { 
            text-decoration: none;
            color: #0a1f44; 
            font-weight: bold; 
        }
        h1 { 
            text-align: center; 
            margin-top: 30px; 
        }
        h2 { 
            margin-left: 40px; 
            margin-top: 40px; 
            color: #FFD500; 
        }
        .container { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 20px; 
            padding: 20px 40px; 
        }
        .card { 
            background-color: white; 
            color: #0a1f44;
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .name {
            font-weight: bold; 
            text-transform: uppercase;
        }
        .email { 
            font-size: 13px; 
            margin-top: 5px; 
            color: #555; 
            word-wrap: break-word;
        }
        .role { 
            margin-top: 10px; 
            font-size: 12px; 
            font-weight: bold; 
            background-color: #FFD500; 
            display: inline-block; 
            padding: 3px 8px; 
            border-radius: 6px; 
        }
